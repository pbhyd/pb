<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - This Page Has Gone Stale!</title>
    <style>
        :root {
            --primary-color: #8B5A2B; /* Warm brown */
            --secondary-color: #D2B48C; /* Tan */
            --accent-color: #E67E22; /* Warm orange/gold */
            --text-color: #3E2723; /* Dark chocolate brown */
            --bg-color: #FFFDF9; /* Soft cream */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 90, 43, 0.1);
        }

        .error-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #5D4037;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #fff;
        }

        .btn-primary:hover {
            background-color: var(--text-color);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-color);
            color: var(--text-color);
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        hr {
            border: 0;
            height: 1px;
            background: #E0D4C3;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.25rem; }
            p { font-size: 1rem; }
            .btn-container { flex-direction: column; }
            .btn { width: 100%; }
            .container { padding: 25px 15px; }
        }
    </style>

<script>
async function handleRedirect() {
    const path = window.location.pathname.replace(/\/$/, '');
    try {
        const response = await fetch('./redirects.json');
        const redirects = await response.json();

        if (redirects[path]) {
            window.location.replace(redirects[path]);
            return;
        }
    }
    catch(err) {
        
    }
}

handleRedirect();
</script>

</head>
<body>

    <div class="container">
        <!-- Embedded Image Block -->
        <img src="./404-pure-bakes.webp" alt="Baking 404 Error - Crumb Trails Lead Nowhere!" class="error-image">

        <h1>Oops! We Knead to Talk...</h1>
        <h2>This page has gone stale!</h2>
        
        <p>Our baker clearly overbaked this one. It's a total crumb-tastrophe! <br> Looks like your request got breadly lost in the oven.</p>

        <!-- Main Navigation Links -->
        <div class="btn-container">
            <a href="https://purebakes.in/" class="btn btn-primary">Go to Homepage</a>
        </div>

        <hr>

    </div>

</body>
</html>
